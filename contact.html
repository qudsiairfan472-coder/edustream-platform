<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduStream - Elegant Contact</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-glam sticky-top py-3">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3" href="index.html">Edu<span class="text-rose">Stream</span></a>
            <div class="collapse navbar-collapse" id="myNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link fw-semibold" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link fw-semibold" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link fw-semibold" href="courses.html">Courses</a></li>
                    <li class="nav-item"><a class="nav-link active fw-semibold" href="contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5 fade-in-glam" style="max-width: 550px;">
        <h2 class="text-center mb-4 fw-bold text-dark">Get In <span class="text-gold">Touch</span></h2>
        <div class="card p-4 my-custom-card border-0 shadow-lg rounded-4">
            <form action="#" method="POST">
                <div class="mb-3">
                    <label class="form-label fw-semibold text-teal">Full Name</label>
                    <input type="text" class="form-control" placeholder="Enter full name" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold text-teal">Email Address</label>
                    <input type="email" class="form-control" placeholder="name@example.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold text-teal">Message Description</label>
                    <textarea class="form-control" rows="4" placeholder="Write parameters..." required></textarea>
                </div>
                <button type="submit" class="btn btn-glam w-100 py-2 fs-5 fw-bold"><i class="fa-solid fa-paper-plane me-2"></i>Send Secure Message</button>
            </form>
        </div>
    </div>

    <footer class="text-white text-center py-4 mt-5" style="background-color: #051021;">
        <p class="mb-0 text-muted">&copy; 2026 EduStream Platform. All Rights Reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
