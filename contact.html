<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduStream - Contact Us</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-classic-navy">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">EduStream</a>
            <div class="collapse navbar-collapse" id="myNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="courses.html">Courses</a></li>
                    <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5" style="max-width: 550px;">
        <h2 class="text-center mb-4 fw-bold">Get In Touch</h2>
        <div class="card p-4 my-custom-card">
            <form action="#" method="POST">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Your Full Name</label>
                    <input type="text" class="form-control" placeholder="Enter name" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Email Address</label>
                    <input type="email" class="form-control" placeholder="name@example.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Message</label>
                    <textarea class="form-control" rows="4" placeholder="Type here..." required></textarea>
                </div>
                <button type="submit" class="btn btn-classic w-100">Send Message</button>
            </form>
        </div>
    </div>

    <footer class="bg-classic-navy text-white text-center py-3 mt-5">
        <p class="mb-0">&copy; 2026 EduStream Platform. All Rights Reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
